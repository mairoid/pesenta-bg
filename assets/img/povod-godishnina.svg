<svg xmlns="http://www.w3.org/2000/svg" width="480" height="300" viewBox="0 0 480 300" role="img" aria-label="Годишнина — двама със слушалки на дивана">
  <rect width="480" height="300" fill="#062B33"/>
  <circle cx="420" cy="60" r="30" fill="#2DD4BF" opacity="0.25"/>
  <!-- диван -->
  <g transform="translate(90 140)">
    <rect x="-20" y="30" width="340" height="70" rx="24" fill="#12507A"/>
    <rect x="-34" y="-10" width="46" height="100" rx="20" fill="#0E3A57"/>
    <rect x="288" y="-10" width="46" height="100" rx="20" fill="#0E3A57"/>
    <!-- двамата -->
    <circle cx="90" cy="-6" r="24" fill="#FFB08A"/>
    <rect x="58" y="20" width="64" height="46" rx="18" fill="#FF4D8D"/>
    <circle cx="200" cy="-6" r="24" fill="#E8A06A"/>
    <rect x="168" y="20" width="64" height="46" rx="18" fill="#FFA14D"/>
    <!-- обща жица на слушалките -->
    <path d="M90 22 q55 40 110 0" fill="none" stroke="#F4F2FF" stroke-width="4" opacity="0.7"/>
    <g fill="#2DD4BF">
      <rect x="62" y="-16" width="12" height="22" rx="6"/>
      <rect x="106" y="-16" width="12" height="22" rx="6"/>
      <rect x="172" y="-16" width="12" height="22" rx="6"/>
      <rect x="216" y="-16" width="12" height="22" rx="6"/>
    </g>
    <path d="M66 -30 q24 -26 56 -6 M176 -30 q24 -26 56 -6" fill="none" stroke="#2DD4BF" stroke-width="7" stroke-linecap="round"/>
  </g>
  <!-- сърце-нота -->
  <g transform="translate(240 66)">
    <path d="M0 14 c-10 -18 -36 -14 -38 4 -2 16 16 26 38 42 22 -16 40 -26 38 -42 -2 -18 -28 -22 -38 -4z" fill="#FF4D8D"/>
  </g>
  <path d="M60 80 q12 -18 4 -34" fill="none" stroke="#FFD36E" stroke-width="6" stroke-linecap="round"/>
</svg>
